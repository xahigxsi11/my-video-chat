<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极简视频聊天</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            margin-top: 50px;
        }
        .video-container {
            display: flex;
            justify-content: center;
            gap: 20px; /* 两个视频框的间距 */
        }
        video {
            width: 400px;
            height: 300px;
            background-color: #000; /* 没有画面时显示黑屏 */
            border-radius: 10px; /* 圆角看起来更高级 */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>极简 1对1 视频聊天原型</h1>
    
    <div class="video-container">
        <!-- 自己的画面，加上 muted 防止听到自己的回音 -->
        <video id="localVideo" autoplay playsinline muted></video>
        
        <!-- 对方的画面 -->
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <!-- 引入外部的 JavaScript 文件 -->
   <script src="摄像头.js"></script>
</body>
</html>
