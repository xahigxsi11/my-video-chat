<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>属于惊喜和金毛的web</title>
    <style>
        :root {
            --primary-bg: #1a1a2e;
            --accent-color: #00f2fe;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg);
            background: radial-gradient(circle at center, rgba(26, 26, 46, 0.8) 0%, rgba(26, 26, 46, 1) 100%);
            color: var(--text-color);
            margin: 0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        .photo-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-photo {
            position: absolute;
            width: 180px;
            height: auto;
            padding: 6px 6px 28px 6px;
            background: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-radius: 4px;
            opacity: 0.3;
            transition: opacity 0.3s ease;
            object-fit: cover;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .bg-photo {
                width: 100px;
                padding: 4px 4px 20px 4px;
            }
        }

        .content-layer {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 16px;
        }

        .main-title h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 10px 0 4px;
            text-shadow: 0 5px 15px rgba(0, 242, 254, 0.2);
        }

        .status-pill {
            max-width: 85vw;
            padding: 8px 14px;
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.32);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.86);
            font-size: 13px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .video-hub {
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        video {
            width: 360px;
            max-width: 85vw;
            height: 270px;
            background-color: #000;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .user-label {
            margin-top: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            font-weight: bold;
        }

        .chat-container {
            width: 390px;
            max-width: 85vw;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .msg-me {
            align-self: flex-end;
            background: var(--accent-color);
            color: #1a1a2e;
            border-bottom-right-radius: 2px;
        }

        .msg-peer {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-bottom-left-radius: 2px;
        }

        .chat-input-area {
            display: flex;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            gap: 8px;
        }

        #chatInput {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px 12px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        #sendBtn {
            background: var(--accent-color);
            border: none;
            color: #1a1a2e;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        #sendBtn:active { transform: scale(0.95); }

        .control-bar {
            display: flex;
            gap: 12px;
            padding-bottom: 30px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (min-width: 900px) {
            .video-hub {
                flex-direction: row;
            }
        }

        /* --- Magic Camera --- */
        #localCanvas {
            width: 360px;
            max-width: 85vw;
            height: 270px;
            background-color: #000;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: block;
        }

        .magic-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fps-label {
            font-size: 13px;
            font-family: 'Courier New', monospace;
            color: #00f2fe;
            padding: 4px 10px;
            background: rgba(0, 242, 254, 0.1);
            border-radius: 8px;
            min-width: 60px;
            text-align: center;
        }

        .filter-btn.active {
            background: var(--accent-color);
            color: #1a1a2e;
            border-color: var(--accent-color);
        }

        .capture-btn {
            background: rgba(255, 71, 87, 0.2) !important;
            border-color: #ff4757 !important;
        }
        .capture-btn:hover {
            background: rgba(255, 71, 87, 0.4) !important;
        }

        .btn-ink {
            background: rgba(0, 242, 254, 0.15) !important;
            border-color: rgba(0, 242, 254, 0.4) !important;
        }
        .btn-ink:hover {
            background: rgba(0, 242, 254, 0.3) !important;
        }

        .air-writing-btn.active {
            background: rgba(46, 213, 115, 0.3) !important;
            border-color: #2ed573 !important;
        }

        @media (max-width: 768px) {
            #localCanvas {
                width: 85vw;
                height: calc(85vw * 3 / 4);
            }
        }
    </style>
</head>
<body>

    <div class="photo-background" id="photoBackground"></div>

    <div class="content-layer">
        <div class="main-title">
            <h1>10.29 & 1.14</h1>
        </div>

        <div id="connectionStatus" class="status-pill">正在启动...</div>

        <div class="video-hub">
            <div class="video-card">
                <canvas id="localCanvas"></canvas>
                <video id="localVideo" autoplay playsinline muted style="position:absolute;width:0;height:0;opacity:0;pointer-events:none"></video>
                <div class="user-label">You</div>
            </div>

            <div class="video-card">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="user-label">Peer</div>
            </div>
        </div>

        <div class="magic-bar">
            <span id="fpsDisplay" class="fps-label">0 FPS</span>
            <button class="btn filter-btn active" data-filter="normal">Normal</button>
            <button class="btn filter-btn" data-filter="grayscale">Grayscale</button>
            <button class="btn filter-btn" data-filter="high-contrast">High Contrast</button>
            <button id="mirrorToggle" class="btn">🪞 Mirror</button>
            <button id="captureBtn" class="btn capture-btn">📸 Capture</button>
            <button id="airWritingToggle" class="btn air-writing-btn">✋ Air Writing</button>
            <button id="clearDrawingBtn" class="btn btn-ink">🗑 Clear</button>
            <button id="undoStrokeBtn" class="btn btn-ink">↩ Undo</button>
        </div>

        <div class="chat-container">
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="说点什么吧..." autocomplete="off">
                <button id="sendBtn">发送</button>
            </div>
        </div>

        <div class="control-bar">
            <button id="muteBtn" class="btn">Mute</button>
            <button id="videoBtn" class="btn">Video Off</button>
            <button id="hangupBtn" class="btn" style="background: #ff4757; border: none;">End Call</button>
        </div>
    </div>

    <script>
    // 提取当前 URL 的 token，传递给所有受保护的子资源请求
    (function() {
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token') || '';
        var tokenSuffix = token ? '?token=' + encodeURIComponent(token) : '';

        // 1) 同步加载 main.js（script.async = false 确保执行顺序）
        (function loadMainJS() {
            var s = document.createElement('script');
            s.src = 'main.js' + tokenSuffix;
            s.async = false;
            document.body.appendChild(s);
        })();

        // 2) 照片背景动态加载（异步，不阻塞）
        (function loadPhotoBackground() {
            var container = document.getElementById('photoBackground');
            if (!container) return;

            fetch('assets/photos/photos.json' + tokenSuffix)
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(function(data) {
                    var allPhotos = data.photos;
                    if (!allPhotos || allPhotos.length === 0) return;

                    var count = Math.min(Math.floor(Math.random() * 5) + 6, allPhotos.length);
                    var shuffled = [...allPhotos].sort(function() { return Math.random() - 0.5; });
                    var selected = shuffled.slice(0, count);

                    selected.forEach(function(src, i) {
                        var img = document.createElement('img');
                        img.className = 'bg-photo';
                        img.src = src.replace(/\\/g, '/') + tokenSuffix;
                        img.alt = 'memorial';

                        var left, top;
                        var zone = i % 4;
                        switch (zone) {
                            case 0: left = Math.random() * 30; top = Math.random() * 30; break;
                            case 1: left = 70 + Math.random() * 28; top = Math.random() * 30; break;
                            case 2: left = Math.random() * 30; top = 70 + Math.random() * 28; break;
                            case 3: left = 70 + Math.random() * 28; top = 70 + Math.random() * 28; break;
                        }

                        img.style.left = left + '%';
                        img.style.top = top + '%';

                        var rotation = (Math.random() * 40 - 20).toFixed(1);
                        var scaleVal = (Math.random() * 0.4 + 0.8).toFixed(2);
                        img.style.transform = 'rotate(' + rotation + 'deg) scale(' + scaleVal + ')';

                        img.style.opacity = (Math.random() * 0.3 + 0.15).toFixed(2);

                        container.appendChild(img);
                    });
                })
                .catch(function(err) {
                    console.warn('照片背景加载失败（不影响正常使用）:', err.message);
                });
        })();
    })();
    </script>
</body>
</html>
